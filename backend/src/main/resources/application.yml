spring:
  application:
    name: busan-ai-map

  config:
    import: "optional:file:.env[.properties]"

server:
  port: ${SERVER_PORT:8080}

external-api:
  naver:
    search:
      client-id: ${NAVER_SEARCH_CLIENT_ID:}
      client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}
  gemma:
    api-key: ${GEMMA_API_KEY:}
    model: ${GEMMA_MODEL:gemma-4-31b-it}

  # 한국관광공사 OpenAPI
  tourism:
    service-key: ${DATA_GO_KR_API_KEY:}
    local:
      base-url: https://apis.data.go.kr/B551011/LocgoHubTarService1
    related:
      base-url: https://apis.data.go.kr/B551011/TarRlteTarService1

  # 기상청 OpenAPI
  weather:
    service-key: ${DATA_GO_KR_API_KEY:}
    base-url: https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0

  # 부산시 교통량(AVI) 공공데이터포털 API — data.go.kr 계정 키 공용, 단 AVI 엔드포인트 별도 활용신청 필요할 수 있음
  avi:
    service-key: ${DATA_GO_KR_API_KEY:}

  naver-directions:
    base-url: ${NAVER_DIRECTIONS_BASE_URL:https://maps.apigw.ntruss.com}
    key-id: ${NAVER_DIRECTIONS_KEY_ID:}
    key-secret: ${NAVER_DIRECTIONS_KEY_SECRET:}

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}

