services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: roamate
      MYSQL_USER: roamate
      MYSQL_PASSWORD: roamate
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - roamate_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/roamate
      DB_USERNAME: roamate
      DB_PASSWORD: roamate
      JWT_SECRET: change-this-before-real-deploy-please-use-a-long-random-value
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  roamate_mysql_data:
